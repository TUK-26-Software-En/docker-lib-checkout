version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: library-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - library-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  library-checkout:
    build:
      context: ./library-checkout/library
    container_name: library-checkout
    environment:
      # DATABASE_URL is composed from individual POSTGRES_* vars.
      # library-checkout connects to postgres via docker internal network (always port 5432).
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}"
      DB_TABLE_BOOKS: ${DB_TABLE_BOOKS}
      DB_TABLE_MEMBERS: ${DB_TABLE_MEMBERS}
      DB_TABLE_LOANS: ${DB_TABLE_LOANS}
      APP_TITLE: ${APP_TITLE}
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "${LIBRARY_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - library-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  health-monitoring:
    build:
      context: ./health-monitoring
    container_name: health-monitoring
    environment:
      LIBRARY_URL: ${LIBRARY_URL}
      POLL_INTERVAL: ${POLL_INTERVAL}
      MAX_HISTORY: ${MAX_HISTORY}
    ports:
      - "${MONITOR_PORT}:8001"
    depends_on:
      library-checkout:
        condition: service_healthy
    networks:
      - library-net

networks:
  library-net:
    driver: bridge

volumes:
  postgres_data:
